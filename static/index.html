<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Price Tracker — Monitor Prices, Never Miss a Deal</title>
    <meta name="description" content="Track e-commerce product prices and get instant email alerts when prices drop below your target. Save money effortlessly.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Animated background particles -->
    <canvas id="particles-canvas"></canvas>

    <!-- Header -->
    <header class="header">
        <div class="header-inner container">
            <div class="logo">
                <div class="logo-icon">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="12" y1="1" x2="12" y2="23"></line>
                        <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path>
                    </svg>
                </div>
                <span class="logo-text">PriceTracker</span>
            </div>
            <nav class="header-nav">
                <button class="btn btn-ghost" id="btn-check-all" title="Check all prices now">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"></polyline><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path></svg>
                    <span>Check All</span>
                </button>
            </nav>
        </div>
    </header>

    <!-- Main content -->
    <main class="main container">

        <!-- Hero / Stats row -->
        <section class="stats-row" id="stats-row">
            <div class="stat-card" id="stat-total">
                <div class="stat-icon stat-icon--blue">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"></path><line x1="7" y1="7" x2="7.01" y2="7"></line></svg>
                </div>
                <div class="stat-info">
                    <span class="stat-value" id="stat-total-value">0</span>
                    <span class="stat-label">Products Tracked</span>
                </div>
            </div>
            <div class="stat-card" id="stat-below">
                <div class="stat-icon stat-icon--green">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"></polyline><polyline points="17 6 23 6 23 12"></polyline></svg>
                </div>
                <div class="stat-info">
                    <span class="stat-value" id="stat-below-value">0</span>
                    <span class="stat-label">Below Threshold</span>
                </div>
            </div>
            <div class="stat-card" id="stat-above">
                <div class="stat-icon stat-icon--amber">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 18 13.5 8.5 8.5 13.5 1 6"></polyline><polyline points="17 18 23 18 23 12"></polyline></svg>
                </div>
                <div class="stat-info">
                    <span class="stat-value" id="stat-above-value">0</span>
                    <span class="stat-label">Above Threshold</span>
                </div>
            </div>
        </section>

        <!-- Add Product Form -->
        <section class="add-section glass-card" id="add-section">
            <h2 class="section-title">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="16"></line><line x1="8" y1="12" x2="16" y2="12"></line></svg>
                Track a New Product
            </h2>
            <form id="add-form" autocomplete="off">
                <div class="form-row">
                    <div class="form-group form-group--url">
                        <label for="input-url">Product URL</label>
                        <div class="input-wrapper">
                            <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path></svg>
                            <input type="url" id="input-url" placeholder="https://www.amazon.com/dp/..." required>
                        </div>
                    </div>
                    <div class="form-group form-group--threshold">
                        <label for="input-threshold">Target Price</label>
                        <div class="input-wrapper">
                            <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"></line><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>
                            <input type="number" id="input-threshold" placeholder="29.99" step="0.01" min="0.01" required>
                        </div>
                    </div>
                    <div class="form-group form-group--email">
                        <label for="input-email">Alert Email <span class="optional">(optional)</span></label>
                        <div class="input-wrapper">
                            <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
                            <input type="email" id="input-email" placeholder="you@example.com">
                        </div>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary btn-add" id="btn-add">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="16"></line><line x1="8" y1="12" x2="16" y2="12"></line></svg>
                    <span>Start Tracking</span>
                    <div class="btn-loader" style="display:none"></div>
                </button>
            </form>
        </section>

        <!-- Products List -->
        <section class="products-section" id="products-section">
            <h2 class="section-title">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"></path><line x1="7" y1="7" x2="7.01" y2="7"></line></svg>
                Tracked Products
            </h2>
            <div class="products-grid" id="products-grid">
                <!-- Populated by JS -->
            </div>
            <div class="empty-state" id="empty-state" style="display:none">
                <div class="empty-icon">
                    <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"></path><line x1="7" y1="7" x2="7.01" y2="7"></line></svg>
                </div>
                <h3>No products tracked yet</h3>
                <p>Add a product URL above to start monitoring prices.</p>
            </div>
        </section>
    </main>

    <!-- Price History Modal -->
    <div class="modal-overlay" id="modal-overlay">
        <div class="modal glass-card" id="history-modal">
            <div class="modal-header">
                <h3 id="modal-title">Price History</h3>
                <button class="btn btn-ghost btn-close" id="modal-close">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </button>
            </div>
            <div class="modal-body" id="modal-body">
                <!-- Populated by JS -->
            </div>
        </div>
    </div>

    <!-- Toast container -->
    <div class="toast-container" id="toast-container"></div>

    <script src="app.js"></script>
</body>
</html>
